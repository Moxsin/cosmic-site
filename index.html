<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Космический сайт</title>
<link rel="icon" type="image/png" href="/cosmic-site/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  height: 100vh;
  background: black;
  color: white;
  transition: background 0.5s, color 0.5s;
}
.fog {
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: 
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent 70%),
    radial-gradient(circle at 70% 70%, rgba(200,200,255,0.07), transparent 70%),
    radial-gradient(circle at 50% 50%, rgba(255,220,200,0.06), transparent 80%);
  animation: drift 60s linear infinite;
  pointer-events: none;
}
@keyframes drift {0%{transform:translate(0,0);}50%{transform:translate(80px,-50px);}100%{transform:translate(0,0);}}
.comet {
  position: absolute;
  border-radius: 50%;
  background: var(--color);
  box-shadow: 0 0 10px var(--color),0 0 20px var(--color);
  width:16px;height:16px;
}
.comet::before {
  content:"";position:absolute;top:50%;left:50%;width:6px;height:6px;background:var(--color);
  border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--color);
}
.comet::after {
  content:"";position:absolute;top:50%;left:-120px;width:120px;height:6px;
  background:linear-gradient(to left,var(--color),transparent);transform:translateY(-50%);
  border-radius:50%;opacity:0.8;
}
.box {
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background: rgba(255,255,255,0.05);padding:20px;border-radius:20px;
  text-align:center;width:90%;max-width:350px;z-index:10;
}
h1{margin-bottom:20px;font-weight:300;}
input, textarea, select {width:100%;padding:10px;margin:10px 0;border-radius:10px;border:none;outline:none;background:rgba(255,255,255,0.1);color:white;box-sizing:border-box;}
button {width:48%;padding:10px;margin-top:10px;border:none;border-radius:10px;background:white;color:black;cursor:pointer;transition:0.3s;}
button:hover{opacity:0.8;}
.row{display:flex;justify-content:space-between;flex-wrap:wrap;}
.message{margin-top:15px;font-size:14px;opacity:0.8;}
#confirmBox{display:none;margin-top:15px;}
#confirmCode{width:100%;padding:8px;margin-top:10px;border-radius:10px;border:none;outline:none;background:rgba(255,255,255,0.1);color:white;}
#confirmButton{width:100%;padding:10px;margin-top:10px;border:none;border-radius:10px;background:white;color:black;cursor:pointer;}
#confirmButton:hover{opacity:0.8;}
#greeting {
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  font-size:20px;font-weight:500;color:white;z-index:30;text-align:center;
}
#cosmoPanel {
  position:absolute;top:60px;left:50%;transform:translateX(-50%);
  width:90%;max-width:650px;padding:20px;background: rgba(0,0,0,0.85);
  border-radius:20px;color:white;z-index:20;box-shadow:0 0 30px rgba(255,255,255,0.2);
  opacity:0;transition:opacity 1s ease;
  display:flex;flex-direction:row;max-height:75vh;overflow:hidden;
}
#noteList { width:35%;border-right:1px solid rgba(255,255,255,0.3);padding-right:10px;overflow-y:auto; }
#noteContent {
  width:65%;padding:10px;overflow-y:auto;
  height:500px;
  background: rgba(255,255,255,0.05);
  border-radius:10px;
  box-sizing:border-box;
}
.note-title-item {padding:6px;cursor:pointer;border-radius:8px;margin-bottom:5px;background:rgba(255,255,255,0.1);}
.note-title-item:hover {background:rgba(255,255,255,0.2);}
#createNoteBtn { width:180px; margin-top:10px; padding:10px; border-radius:10px; border:none; background:white; color:black; cursor:pointer; transition:0.3s; }
#createNoteBtn:hover { opacity:0.8; }
#profileWidget {
  position:absolute;top:20px;right:20px;width:90%;max-width:220px;background: rgba(0,0,0,0.85);
  border-radius:20px;padding:15px;color:white;z-index:25;box-shadow:0 0 20px rgba(255,255,255,0.2);
  opacity:0;transition:opacity 1s ease;
}
select {width:100%;padding:10px;margin-top:5px;border-radius:10px;border:none;outline:none;background:rgba(255,255,255,0.1);color:white;appearance:none;}
select option {color:black;background:white;}
</style>
</head>
<body>
<div class="fog"></div>

<div class="box">
  <h1>Добро пожаловать!</h1>
  <input type="email" id="email" placeholder="Почта">
  <input type="password" id="password" placeholder="Пароль">
  <div class="row">
    <button onclick="login()">Вход</button>
    <button onclick="register()">Регистрация</button>
  </div>
  <div class="message" style="margin-top:10px; font-size:14px; opacity:0.8;">
    Главный партнер: <a href="https://roks4n.github.io/DiaryESPAD/" target="_blank" style="color:#ffd700; text-decoration:underline;">ESPAD</a>
  </div>
  <div id="confirmBox">
    <input type="text" id="confirmCode" placeholder="Введите код подтверждения">
    <button id="confirmButton" onclick="confirmCode()">Продолжить</button>
    <div class="message" id="codeMsg"></div>
  </div>
  <div class="message" id="msg"></div>
</div>

<div id="greeting"></div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){ emailjs.init("5uF4Rc9FAYXB_gVeg"); })();
const pastelColors=["#d0e7ff","#e6d0ff","#fff5cc","#d0fff0","#ffd6d6"];
let cometInterval=null;
const greetings=["Привет, чем сегодня займемся?","Привет, что нового?"];
function createComet(){
  const c=document.createElement("div");c.classList.add("comet");
  const color=pastelColors[Math.floor(Math.random()*pastelColors.length)];
  c.style.setProperty("--color",color);c.style.top=Math.random()*window.innerHeight+"px";c.style.left="-150px";
  const duration=Math.random()*3000+4000;const translateY=Math.random()*300-150;
  document.body.appendChild(c);
  c.animate([{transform:"translate(0,0)",opacity:1},{transform:`translate(${window.innerWidth+300}px,${translateY}px)`,opacity:0}],{duration:duration,easing:"linear"});
  setTimeout(()=>c.remove(),duration);
}
function startComets(){if(!cometInterval){cometInterval=setInterval(createComet,400);document.querySelector(".fog").style.display="block";}}
function stopComets(){clearInterval(cometInterval);cometInterval=null;document.querySelector(".fog").style.display="none";}
let currentEmail=null;

function login(){
  const email=document.getElementById("email").value.trim().toLowerCase();
  const pass=document.getElementById("password").value;
  const saved=JSON.parse(localStorage.getItem(email));
  if(saved && saved.password===pass){document.getElementById("msg").innerText="Успешный вход ✅";createDashboard(email);}
  else{document.getElementById("msg").innerText="Неверные данные ❌";}
}

function register(){
  const email=document.getElementById("email").value.trim().toLowerCase();
  const pass=document.getElementById("password").value;
  if(!email||!pass){document.getElementById("msg").innerText="Заполни поля";return;}
  const code=Math.floor(100000+Math.random()*900000);
  localStorage.setItem("verify_code_"+email,code);localStorage.setItem("verify_pass_"+email,pass);
  currentEmail=email;
  emailjs.send("Moxsin","template_2474a3l",{to_email:email,code:code}).then(()=>{document.getElementById("msg").innerText="Код отправлен на почту 📩";}).catch(()=>{document.getElementById("msg").innerText="Ошибка отправки ❌";});
  document.getElementById("confirmBox").style.display="block";
}

function confirmCode(){
  const input=document.getElementById("confirmCode").value;
  const savedCode=localStorage.getItem("verify_code_"+currentEmail);
  const savedPass=localStorage.getItem("verify_pass_"+currentEmail);
  if(input===savedCode){
    localStorage.setItem(currentEmail,JSON.stringify({password:savedPass}));
    document.getElementById("codeMsg").innerText="Регистрация подтверждена ✅";
    localStorage.removeItem("verify_code_"+currentEmail);localStorage.removeItem("verify_pass_"+currentEmail);
    document.getElementById("confirmBox").style.display="none";
  } else {document.getElementById("codeMsg").innerText="Неверный код ❌";}
}

function createDashboard(email){
  document.querySelector(".box").style.display="none";
  const greeting = greetings[Math.floor(Math.random()*greetings.length)];
  document.getElementById("greeting").innerText = greeting;
  const panel=document.createElement("div");panel.id="cosmoPanel";
  panel.innerHTML=`<div id="noteList"></div><div id="noteContent">Выберите заметку</div>`;
  const addNoteBtn=document.createElement("button");
  addNoteBtn.id="createNoteBtn"; addNoteBtn.innerText="Создать новую заметку"; 
  addNoteBtn.onclick=()=>createNote(email);
  panel.appendChild(addNoteBtn);
  document.body.appendChild(panel);
  setTimeout(()=>panel.style.opacity="1",50);
  displayNotes(email);

  const widget=document.createElement("div");widget.id="profileWidget";
  const profileBtn=document.createElement("button");profileBtn.innerText="Профиль";
  profileBtn.style.width="100%";profileBtn.style.padding="8px";profileBtn.style.border="none";
  profileBtn.style.borderRadius="10px";profileBtn.style.cursor="pointer";
  profileBtn.onclick=()=>openProfile(email);
  widget.appendChild(profileBtn);
  document.body.appendChild(widget);
  setTimeout(()=>widget.style.opacity="1",300);
  applyTheme(localStorage.getItem(email+"_theme")||"dark");
}

function createNote(email){
  const title=prompt("Название заметки:"); if(!title) return;
  const text=prompt("Текст заметки:"); if(text===null) return;
  const notes=JSON.parse(localStorage.getItem(email+"_notes")||"[]");
  notes.push({title,text}); localStorage.setItem(email+"_notes",JSON.stringify(notes));
  displayNotes(email);
}

function displayNotes(email){
  const noteList=document.getElementById("noteList"); noteList.innerHTML="";
  const notes=JSON.parse(localStorage.getItem(email+"_notes")||"[]");
  notes.forEach((n,i)=>{
    const div=document.createElement("div"); div.className="note-title-item"; div.innerText=n.title;
    div.onclick=()=>{document.getElementById("noteContent").innerText=n.text;};
    noteList.appendChild(div);
  });
}

function openProfile(email){
  const widget=document.getElementById("profileWidget");widget.innerHTML="";
  const title=document.createElement("h3");title.innerText="Ваш профиль"; title.style.textAlign="center"; widget.appendChild(title);
  const nickLabel=document.createElement("label");nickLabel.innerText="Имя: "; nickLabel.style.display="block"; widget.appendChild(nickLabel);
  const nickInput=document.createElement("input");nickInput.type="text"; nickInput.placeholder="Введите имя";nickInput.value=localStorage.getItem(email+"_nickname")||"";nickInput.onchange=()=>localStorage.setItem(email+"_nickname",nickInput.value); widget.appendChild(nickInput);
  const avatar=document.createElement("input");avatar.type="file";avatar.accept="image/*";avatar.style.marginTop="5px";
  avatar.onchange=(e)=>{const reader=new FileReader();reader.onload=function(){localStorage.setItem(email+"_avatar",reader.result);avatarPreview.src=reader.result;};reader.readAsDataURL(e.target.files[0]);};
  widget.appendChild(avatar);
  const avatarPreview=document.createElement("img");avatarPreview.src=localStorage.getItem(email+"_avatar")||"";avatarPreview.style.width="80px";avatarPreview.style.height="80px";avatarPreview.style.borderRadius="50%";avatarPreview.style.display="block";avatarPreview.style.margin="10px auto";widget.appendChild(avatarPreview);

  const themeLabel=document.createElement("label"); themeLabel.innerText="Тема: ";
  const themeSelect=document.createElement("select");
  const light=document.createElement("option"); light.value="light"; light.innerText="Светлая";
  const dark=document.createElement("option"); dark.value="dark"; dark.innerText="Темная";
  themeSelect.appendChild(light); themeSelect.appendChild(dark); themeSelect.value=localStorage.getItem(email+"_theme")||"dark";
  themeSelect.addEventListener("change",()=>{localStorage.setItem(email+"_theme",themeSelect.value);applyTheme(themeSelect.value);themeSelect.style.color="white";});
  widget.appendChild(themeLabel); themeLabel.appendChild(themeSelect);themeSelect.style.color="white";

  const desc=document.createElement("textarea");desc.placeholder="Добавьте описание...";desc.style.width="100%";desc.style.height="50px";desc.style.marginTop="5px";desc.value=localStorage.getItem(email+"_desc")||"";desc.onchange=()=>localStorage.setItem(email+"_desc",desc.value);widget.appendChild(desc);

  const backBtn=document.createElement("button");backBtn.innerText="Закрыть";backBtn.style.width="100%";backBtn.style.marginTop="8px";
  backBtn.onclick=()=>{widget.innerHTML="";const profileBtn=document.createElement("button");profileBtn.innerText="Профиль";profileBtn.style.width="100%";profileBtn.style.padding="8px";profileBtn.style.border="none";profileBtn.style.borderRadius="10px";profileBtn.style.cursor="pointer";profileBtn.onclick=()=>openProfile(email);widget.appendChild(profileBtn);};
  widget.appendChild(backBtn);
}

function applyTheme(theme){
  if(theme==="light"){document.body.style.background="#fdfdfd";document.body.style.color="#333";stopComets();}
  else{document.body.style.background="black";document.body.style.color="white";startComets();}
}

startComets();
</script>
</body>
</html>
